name: CI

on:
  push:
    branches: [main, "refactor/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  build-lint-test:
    name: Build + Lint + Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript build check
        run: pnpm build

      - name: ESLint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test --run
        env:
          # 测试环境不需要真实 API Key
          QWEN_API_KEY: test-key-placeholder

      # 可选：覆盖率报告（不强制阻断，先收集数据）
      - name: Coverage report
        run: pnpm test --run --coverage
        continue-on-error: true
        env:
          QWEN_API_KEY: test-key-placeholder

  # 子包构建检查
  apps-build:
    name: Apps Build Check
    runs-on: ubuntu-latest
    needs: build-lint-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build graph-server
        run: pnpm --filter weave-graph-server build

      - name: Build graph-web
        run: pnpm --filter weave-graph-web build
